name: Build & Release

on:
  push:
    tags:
      - "v*"   # Se activa al hacer: git tag v1.0 && git push --tags

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/GimbernatBros/GimbernatBros.exe
            name: GimbernatBros-Windows.exe

          - os: macos-latest
            artifact: dist/GimbernatBros.app
            name: GimbernatBros-Mac.zip

          - os: ubuntu-latest
            artifact: dist/GimbernatBros/GimbernatBros
            name: GimbernatBros-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pygame-ce pyinstaller

      - name: Compilar
        run: pyinstaller game.spec --clean --noconfirm

      # --- Mac: comprimir .app en zip ---
      - name: Comprimir .app (solo Mac)
        if: runner.os == 'macOS'
        run: zip -r dist/GimbernatBros-Mac.zip dist/GimbernatBros.app

      # --- Subir artefacto al Release ---
      - name: Subir ejecutable Windows/Linux
        if: runner.os != 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          name: ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir ejecutable Mac
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GimbernatBros-Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
